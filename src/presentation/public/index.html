<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💸 RachaConta — Republicas & Grupos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --lime: #c8f135;
      --dark: #111111;
      --mid: #1e1e1e;
      --card: #262626;
      --border: #333;
      --muted: #666;
      --red: #ff4d4d;
      --green: #44ff88;
      --text: #f0f0f0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
    }

    header {
      padding: 2rem 2rem 1rem;
      border-bottom: 2px solid var(--lime);
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }

    header h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 2rem;
      color: var(--lime);
      letter-spacing: -1px;
    }

    header span {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      height: calc(100vh - 75px);
    }

    /* SIDEBAR */
    .sidebar {
      border-right: 1px solid var(--border);
      padding: 1.5rem 1rem;
      overflow-y: auto;
    }

    .sidebar h2 {
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .new-group-form {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    input[type="text"] {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 0.75rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      flex: 1;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: var(--lime); }
    input[type="text"]::placeholder { color: var(--muted); }

    button {
      background: var(--lime);
      color: var(--dark);
      border: none;
      padding: 0.5rem 0.75rem;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      cursor: pointer;
      transition: opacity 0.15s;
      letter-spacing: 0.5px;
    }

    button:hover { opacity: 0.85; }

    button.outline {
      background: transparent;
      color: var(--lime);
      border: 1px solid var(--lime);
    }

    button.danger {
      background: transparent;
      color: var(--red);
      border: 1px solid var(--red);
    }

    button.sm { font-size: 0.65rem; padding: 0.3rem 0.5rem; }

    .grupo-item {
      padding: 0.75rem;
      border: 1px solid var(--border);
      margin-bottom: 0.5rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .grupo-item:hover { border-color: var(--lime); }
    .grupo-item.ativo { border-color: var(--lime); background: rgba(200,241,53,0.06); }

    .grupo-item .nome {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .grupo-item .meta {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }

    /* MAIN */
    .main {
      padding: 2rem;
      overflow-y: auto;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 1rem;
      color: var(--muted);
      text-align: center;
    }

    .empty-state .emoji { font-size: 3rem; }
    .empty-state p { font-size: 0.85rem; line-height: 1.6; }

    .group-header {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
    }

    .group-header h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
    }

    .total-badge {
      background: var(--lime);
      color: var(--dark);
      padding: 0.2rem 0.6rem;
      font-size: 0.75rem;
      font-weight: 700;
      font-family: 'Syne', sans-serif;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .section-title {
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 1.25rem;
    }

    .membro-chip {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.8rem;
    }

    .membro-chip:last-child { border-bottom: none; }

    .saldo-pos { color: var(--green); }
    .saldo-neg { color: var(--red); }
    .saldo-zero { color: var(--muted); }

    .add-membro-form {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .despesa-item {
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.75rem;
    }

    .despesa-item:last-child { border-bottom: none; }

    .despesa-item .desc { font-weight: 700; margin-bottom: 0.2rem; }
    .despesa-item .sub { color: var(--muted); }

    .cat-tag {
      display: inline-block;
      padding: 0.1rem 0.4rem;
      font-size: 0.6rem;
      border: 1px solid var(--border);
      color: var(--muted);
      margin-left: 0.5rem;
      vertical-align: middle;
    }

    .add-despesa-form {
      display: grid;
      gap: 0.75rem;
    }

    .field-label {
      font-size: 0.65rem;
      color: var(--muted);
      margin-bottom: 0.25rem;
    }

    select {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 0.75rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      width: 100%;
      outline: none;
    }

    select:focus { border-color: var(--lime); }

    .checkbox-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .checkbox-list label {
      font-size: 0.75rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.25rem 0.5rem;
      border: 1px solid var(--border);
    }

    .checkbox-list label:has(input:checked) {
      border-color: var(--lime);
      background: rgba(200,241,53,0.07);
    }

    .acerto-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.8rem;
    }

    .acerto-item:last-child { border-bottom: none; }

    .acerto-seta { color: var(--lime); }
    .acerto-valor { margin-left: auto; font-weight: 700; color: var(--lime); }

    .error-msg {
      color: var(--red);
      font-size: 0.75rem;
      padding: 0.5rem;
      border: 1px solid var(--red);
      margin-top: 0.5rem;
      display: none;
    }

    .error-msg.show { display: block; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: var(--border); }
  </style>
</head>
<body>
  <header>
    <h1>💸 RachaConta</h1>
    <span>projeto poo — Ivanildo Marques — 2026</span>
  </header>

  <div class="layout">
    <!-- Sidebar: lista de grupos -->
    <aside class="sidebar">
      <h2>Grupos</h2>
      <div class="new-group-form">
        <input type="text" id="novo-grupo-nome" placeholder="Nome do grupo..." />
        <button onclick="criarGrupo()">+</button>
      </div>
      <div id="lista-grupos"></div>
    </aside>

    <!-- Main: detalhes do grupo -->
    <main class="main" id="main-content">
      <div class="empty-state">
        <div class="emoji">🏠</div>
        <p>Crie ou selecione um grupo<br/>pra começar a rachar as contas</p>
      </div>
    </main>
  </div>

  <script>
    let grupoAtivoId = null;

    async function api(method, path, body) {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const r = await fetch(path, opts);
      return r.json();
    }

    async function carregarGrupos() {
      const grupos = await api('GET', '/grupos');
      const el = document.getElementById('lista-grupos');
      if (!grupos.length) {
        el.innerHTML = '<p style="color:var(--muted);font-size:0.75rem">nenhum grupo ainda</p>';
        return;
      }
      el.innerHTML = grupos.map(g => `
        <div class="grupo-item ${g.id === grupoAtivoId ? 'ativo' : ''}" onclick="selecionarGrupo('${g.id}')">
          <div class="nome">${g.nome}</div>
          <div class="meta">${g.membros} membros · ${g.totalGasto}</div>
        </div>
      `).join('');
    }

    async function criarGrupo() {
      const nome = document.getElementById('novo-grupo-nome').value.trim();
      if (!nome) return;
      const res = await api('POST', '/grupos', { nome });
      if (res.erro) { alert('Erro: ' + res.erro); return; }
      document.getElementById('novo-grupo-nome').value = '';
      await carregarGrupos();
      selecionarGrupo(res.id);
    }

    async function selecionarGrupo(id) {
      grupoAtivoId = id;
      await carregarGrupos(); // atualiza ativo na sidebar
      const grupo = await api('GET', `/grupos/${id}`);
      renderizarGrupo(grupo);
    }

    function renderizarGrupo(g) {
      document.getElementById('main-content').innerHTML = `
        <div class="group-header">
          <h2>${g.nome}</h2>
          <span class="total-badge">Total: ${g.totalGasto}</span>
        </div>

        <div class="grid-2">
          <!-- Membros -->
          <div>
            <p class="section-title">Membros</p>
            <div class="card">
              <div class="add-membro-form">
                <input type="text" id="novo-membro" placeholder="Nome do membro..." />
                <button class="sm" onclick="adicionarMembro('${g.id}')">Adicionar</button>
              </div>
              <div id="lista-membros">
                ${g.membros.length === 0
                  ? '<p style="color:var(--muted);font-size:0.75rem">nenhum membro ainda</p>'
                  : g.membros.map(m => `
                    <div class="membro-chip">
                      <span>${m.nome}</span>
                      <span class="${m.saldo.startsWith('-') ? 'saldo-neg' : m.saldo === 'R$ 0,00' ? 'saldo-zero' : 'saldo-pos'}">${m.saldo}</span>
                    </div>
                  `).join('')
                }
              </div>
            </div>
          </div>

          <!-- Acertos -->
          <div>
            <p class="section-title">Quem deve pra quem</p>
            <div class="card">
              ${g.acertos.length === 0
                ? '<p style="color:var(--green);font-size:0.75rem">✓ tudo quitado!</p>'
                : g.acertos.map(a => `
                  <div class="acerto-item">
                    <span>${a.de}</span>
                    <span class="acerto-seta">→</span>
                    <span>${a.para}</span>
                    <span class="acerto-valor">${a.valor}</span>
                  </div>
                `).join('')
              }
            </div>
          </div>
        </div>

        <!-- Adicionar despesa -->
        <p class="section-title">Registrar Despesa</p>
        <div class="card" style="margin-bottom:1.5rem">
          ${g.membros.length < 2
            ? '<p style="color:var(--muted);font-size:0.75rem">adicione pelo menos 2 membros pra registrar despesas</p>'
            : `
            <div class="add-despesa-form">
              <div>
                <div class="field-label">Descrição</div>
                <input type="text" id="desp-desc" placeholder="ex: conta de luz" style="width:100%" />
              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem">
                <div>
                  <div class="field-label">Valor (R$)</div>
                  <input type="text" id="desp-valor" placeholder="ex: 150,00" style="width:100%" />
                </div>
                <div>
                  <div class="field-label">Categoria</div>
                  <select id="desp-cat">
                    <option value="OUTROS">Outros</option>
                    <option value="MERCADO">Mercado</option>
                    <option value="AGUA">Água</option>
                    <option value="LUZ">Luz</option>
                    <option value="INTERNET">Internet</option>
                    <option value="ALUGUEL">Aluguel</option>
                  </select>
                </div>
              </div>
              <div>
                <div class="field-label">Quem pagou?</div>
                <select id="desp-pagou">
                  ${g.membros.map(m => `<option value="${m.id}">${m.nome}</option>`).join('')}
                </select>
              </div>
              <div>
                <div class="field-label">Dividir com quem? (marque todos)</div>
                <div class="checkbox-list" id="desp-dividir">
                  ${g.membros.map(m => `
                    <label>
                      <input type="checkbox" value="${m.id}" checked />
                      ${m.nome}
                    </label>
                  `).join('')}
                </div>
              </div>
              <div class="error-msg" id="desp-erro"></div>
              <button onclick="registrarDespesa('${g.id}')">Registrar Despesa</button>
            </div>
          `}
        </div>

        <!-- Historico de despesas -->
        <p class="section-title">Histórico de Despesas</p>
        <div class="card">
          ${g.despesas.length === 0
            ? '<p style="color:var(--muted);font-size:0.75rem">nenhuma despesa registrada</p>'
            : [...g.despesas].reverse().map(d => `
              <div class="despesa-item">
                <div class="desc">${d.descricao} <span class="cat-tag">${d.categoria}</span></div>
                <div class="sub">${d.valor} · ${d.valorPorPessoa}/pessoa</div>
              </div>
            `).join('')
          }
        </div>
      `;
    }

    async function adicionarMembro(grupoId) {
      const nome = document.getElementById('novo-membro').value.trim();
      if (!nome) return;
      const res = await api('POST', `/grupos/${grupoId}/membros`, { nome });
      if (res.erro) { alert('Erro: ' + res.erro); return; }
      document.getElementById('novo-membro').value = '';
      selecionarGrupo(grupoId);
      carregarGrupos();
    }

    async function registrarDespesa(grupoId) {
      const desc = document.getElementById('desp-desc').value.trim();
      const valorStr = document.getElementById('desp-valor').value.replace(',', '.').trim();
      const cat = document.getElementById('desp-cat').value;
      const pagouId = document.getElementById('desp-pagou').value;
      const checkboxes = document.querySelectorAll('#desp-dividir input:checked');
      const dividirCom = Array.from(checkboxes).map(c => c.value);

      const erroEl = document.getElementById('desp-erro');

      if (!desc || !valorStr || dividirCom.length === 0) {
        erroEl.textContent = 'Preencha todos os campos e selecione com quem dividir!';
        erroEl.classList.add('show');
        return;
      }

      const reais = parseFloat(valorStr);
      if (isNaN(reais) || reais <= 0) {
        erroEl.textContent = 'Valor inválido';
        erroEl.classList.add('show');
        return;
      }

      const centavos = Math.round(reais * 100);
      const res = await api('POST', `/grupos/${grupoId}/despesas`, {
        descricao: desc,
        valorEmCentavos: centavos,
        quemPagouId: pagouId,
        dividirComIds: dividirCom,
        categoria: cat
      });

      if (res.erro) {
        erroEl.textContent = 'Erro: ' + res.erro;
        erroEl.classList.add('show');
        return;
      }

      erroEl.classList.remove('show');
      selecionarGrupo(grupoId);
      carregarGrupos();
    }

    // enter pra criar grupo
    document.getElementById('novo-grupo-nome').addEventListener('keyup', e => {
      if (e.key === 'Enter') criarGrupo();
    });

    // inicializa
    carregarGrupos();
  </script>
</body>
</html>
